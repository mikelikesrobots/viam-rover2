controller_manager:
  ros__parameters:
    update_rate: 20  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    pid_controller_left_wheel_joint:
      type: pid_controller/PidController

    pid_controller_right_wheel_joint:
      type: pid_controller/PidController

    rover2_base_controller:
      type: diff_drive_controller/DiffDriveController

pid_controller_left_wheel_joint:
  ros__parameters:

    dof_names:
      - left_wheel_joint

    command_interface: velocity

    reference_and_state_interfaces:
      - velocity
      - position

    gains:
      left_wheel_joint: {"p": 0.5, "i": 2.5, "d": 0.0, "i_clamp_min": -10.0, "i_clamp_max": 10.0, "antiwindup": true, "feedforward_gain": 0.95}

    enable_feedforward: true

pid_controller_right_wheel_joint:
  ros__parameters:

    dof_names:
      - right_wheel_joint

    command_interface: velocity

    reference_and_state_interfaces:
      - velocity
      - position

    gains:
      right_wheel_joint: {"p": 0.5, "i": 2.5, "d": 0.0, "i_clamp_min": -10.0, "i_clamp_max": 10.0, "antiwindup": true, "feedforward_gain": 0.95}
    
    enable_feedforward: true

rover2_base_controller:
  ros__parameters:
    left_wheel_names: ["pid_controller_left_wheel_joint/left_wheel_joint"]
    right_wheel_names: ["pid_controller_right_wheel_joint/right_wheel_joint"]

    wheel_separation: 0.25
    #wheels_per_side: 1
    wheel_radius: 0.035

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 25.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.02]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.02]

    open_loop: false
    position_feedback: true
    enable_odom_tf: false

    cmd_vel_timeout: 0.5
    #publish_limited_velocity: true
    #velocity_rolling_window_size: 10

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: false
    linear.x.has_jerk_limits: false
    # linear.x.max_velocity: 0.033
    # linear.x.min_velocity: -0.033
    linear.x.max_velocity: 0.50
    linear.x.min_velocity: -0.50
    linear.x.max_acceleration: 0.8
    linear.x.min_acceleration: -0.8
    linear.x.max_jerk: 0.01
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: false
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 2.5
    angular.z.min_velocity: -2.5
    angular.z.max_acceleration: 3.0
    angular.z.min_acceleration: -3.0
    angular.z.max_jerk: 0.001
    angular.z.min_jerk: 0.0
