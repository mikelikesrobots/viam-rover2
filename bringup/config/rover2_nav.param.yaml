---

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_stamped_cmd_vel: false
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    odom_topic: /odometry/filtered
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 2.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.01
      required_movement_angle: 0.1
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: False
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.03
      yaw_goal_tolerance: 0.12
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30
      lookahead_dist: 0.28
      min_lookahead_dist: 0.18
      max_lookahead_dist: 0.40
      lookahead_time: 1.5
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      # curvature_lookahead_dist: 0.10
      # use_fixed_curvature_lookahead: false
      curvature_deadband_radius: 0.0
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.08
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 0.6
      stateful: false
      max_angular_accel: 6.0
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      initial_transform_timeout: 120.0
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.15, 0.115], [0.15, -0.115], [-0.15, -0.115], [-0.15, 0.115]]"
      footprint_clearing_enabled: true
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.30
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        combination_method: 0
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 0.80
          observation_persistence: 2.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.05
          obstacle_max_range: 2.5
          obstacle_min_range: 0.05
          tf_tolerance: 1.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      initial_transform_timeout: 120.0
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      footprint: "[[0.15, 0.115], [0.15, -0.115], [-0.15, -0.115], [-0.15, 0.115]]"
      resolution: 0.05
      width: 60
      height: 60
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        combination_method: 0
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 2.0
          obstacle_min_range: 0.0
          obstacle_max_range: 2.5
          raytrace_min_range: 0.0
          raytrace_max_range: 3.0
          expected_update_rate: 0.0
          observation_persistence: 2.0
          tf_tolerance: 1.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.20
      use_astar: true
      allow_unknown: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    enable_stamped_cmd_vel: false
    simulate_ahead_time: 1.5
    max_rotational_vel: 2.0
    min_rotational_vel: 0.5
    rotational_acc_lim: 8.0

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    enable_stamped_cmd_vel: false
    max_velocity: [0.50, 0.0, 2.5]
    min_velocity: [-0.50, 0.0, -2.5]
    max_accel: [0.8, 0.0, 8.0]
    max_decel: [-0.8, 0.0, -8.0]
    odom_topic: "/rover2_base_controller/odom"
    odom_duration: 0.05
    deadband_velocity: [0.1, 0.0, 0.03]
    velocity_timeout: 1.0

wandering_mapper:
  ros__parameters:
    enable_initial_rotation: false
    robot_radius: 0.30
    # robot_radius: 0.19
    use_sim_time: false

rtabmap:
  ros__parameters:
    Grid/CellSize: '0.05'
    Grid/RangeMax: '3.0'
    Grid/FootprintHeight: '0.25'
    Grid/FootprintLength: '0.40'
    Grid/FootprintWidth: '0.25'
    Grid/MaxObstacleHeight: '0.40'
    Grid/Sensor: '0'
    Reg/Force3DoF: 'true'
    Rtabmap/DetectionRate: '1.0'
    Rtabmap/TimeThr: '0'
    Mem/RehearsalSimilarity: '0.30'
    Grid/MaxGroundHeight: '0.05'
    Grid/MinGroundHeight: '-0.05'
    Grid/NormalsSegmentation: 'false'
    frame_id: base_link
    approx_sync: true
    odom_frame_id: odom
    map_frame_id: map
    publish_tf: true
    rgbd_cameras: 1
    subscribe_depth: false
    subscribe_rgb: false
    subscribe_rgbd: true
    subscribe_scan: true
    use_sim_time: false

collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smooth"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 0.4
    base_shift_correction: True
    stop_pub_timeout: 3.0
    polygons: ["VelocityPolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      points: "[[0.30, 0.18], [0.30, -0.18], [-0.04, -0.18], [-0.04, 0.18]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    PolygonSlow:
      type: "polygon"
      points: "[[0.50, 0.30], [0.50, -0.30], [0.05, -0.30], [0.05, 0.30]]"
      action_type: "limit"
      min_points: 4
      linear_limit: 0.25
      angular_limit: 2.5
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True
    VelocityPolygonStop:
      type: "velocity_polygon"
      action_type: "stop"
      min_points: 6
      visualize: True
      enabled: False
      polygon_pub_topic: "velocity_polygon_stop"
      velocity_polygons: ["rotation", "translation_forward", "translation_backward", "stopped"]
      holonomic: false
      rotation:
        points: "[[0.24, 0.20], [0.24, -0.20], [-0.24, -0.20], [-0.24, 0.20]]"
        linear_min: -0.05
        linear_max: 0.05
        theta_min: -3.5
        theta_max: 3.5
      translation_forward:
        points: "[[0.38, 0.22], [0.38, -0.22], [-0.05, -0.22], [-0.05, 0.22]]"
        linear_min: 0.08
        linear_max: 1.0
        theta_min: -3.5
        theta_max: 3.5
      translation_backward:
        points: "[[0.08, 0.24], [0.08, -0.24], [-0.40, -0.24], [-0.40, 0.24]]"
        linear_min: -1.0
        linear_max: -0.07
        theta_min: -3.5
        theta_max: 3.5
      stopped:
        points: "[[0.34, 0.22], [0.34, -0.22], [-0.08, -0.22], [-0.08, 0.22]]"
        linear_min: -1.0
        linear_max: 1.0
        theta_min: -3.5
        theta_max: 3.5
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_range: 0.05
      max_range: 2.5
      enabled: True
