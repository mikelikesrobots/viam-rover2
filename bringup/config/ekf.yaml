### robot_localization EKF — fuses wheel odometry + IMU gyro yaw rate
#
# State vector (15 elements):
#   [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
#
# Sensors:
#   odom0  — /rover2_base_controller/odom  (diff_drive_controller)
#   imu0   — /rover2_base_controller/imu   (MPU6050 via RP2040)
#              orientation_covariance[0] = -1  (not provided; ignored by EKF)
#              angular_velocity_covariance diagonal = 0.01 rad²/s²
#
# The EKF owns the odom→base_link TF (enable_odom_tf is disabled on the
# diff_drive_controller so the two sources don't conflict).

ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.5
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    permit_corrected_publication: false
    predict_to_current_time: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ── Wheel odometry ────────────────────────────────────────────────────────
    odom0: /rover2_base_controller/odom
    # [x,    y,     z,
    #  roll, pitch, yaw,
    #  vx,   vy,    vz,
    #  vroll,vpitch,vyaw,
    #  ax,   ay,    az]
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  false, false,
      false, false, true,
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    imu0: /rover2_base_controller/imu
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      false, false, false
    ]

    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 30
    imu0_remove_gravitational_acceleration: false
