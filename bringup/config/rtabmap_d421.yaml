# RTAB-Map configuration for Intel RealSense D421 (depth + infra only, no RGB)
#
# The D421 has no colour module. We feed infra1 (Y8 grayscale) as the visual
# stream in place of RGB.
#
# Topic remappings (set in launch file):
#   rgb/image        -> /camera/infra1/image_rect_raw
#   rgb/camera_info  -> /camera/infra1/camera_info
#   depth/image      -> /camera/depth/image_rect_raw
#   depth/camera_info-> /camera/depth/camera_info

rtabmap:
  ros__parameters:
    delete_db_on_start: true

    # ── Occupancy grid ─────────────────────────────────────────────────────────
    Grid/CellSize: "0.05"
    Grid/RangeMax: "3.0"
    Grid/FootprintHeight: "0.25"
    Grid/FootprintLength: "0.40"
    Grid/FootprintWidth: "0.25"
    Grid/MaxObstacleHeight: "0.40"
    Grid/MaxGroundHeight: "0.15"
    Grid/MinGroundHeight: "-0.05"
    Grid/NormalsSegmentation: "false"
    Grid/Sensor: "0"

    # ── SLAM tuning ────────────────────────────────────────────────────────────
    Optimizer/Strategy: "2"
    Reg/Force3DoF: 'true'
    Reg/Strategy: "2"
    RGBD/NeighborLinkRefining: "True"
    Icp/MaxCorrespondenceDistance: "0.10"
    Icp/PointToPlane: "false"
    Icp/Iterations: "30"
    Icp/MaxTranslation: "0.3"
    Icp/MaxRotation: "0.785"
    Rtabmap/DetectionRate: "1.0"
    Rtabmap/TimeThr: "0"
    Mem/RehearsalSimilarity: "0.60"
    Mem/STMSize: "30"
    Mem/InitWMWithAllNodes: "true"
    RGBD/ProximityMaxGraphDepth: "50"
    RGBD/ProximityPathMaxNeighbors: "0"

    # ── Frames / TF ────────────────────────────────────────────────────────────
    frame_id: base_link
    odom_frame_id: odom
    map_frame_id: map
    publish_tf: true
    use_sim_time: false
    odom_sensor_sync: true

    # ── Sensor inputs ──────────────────────────────────────────────────────────
    # Keep RTAB-Map mapping on the synthetic front scan generated from the
    # depth image. ICP odometry still consumes the native pointcloud.
    subscribe_rgbd: false
    subscribe_depth: false
    subscribe_rgb: false
    subscribe_scan: true
    subscribe_scan_cloud: false
    approx_sync: true
    topic_queue_size: 5
    sync_queue_size: 5
    rgbd_cameras: 1
    # RealSense image/camera_info publishers use sensor-data QoS.
    qos_image: 2
    qos_camera_info: 2
    qos_scan: 0

rgbd_odometry:
  ros__parameters:
    frame_id: base_link
    odom_frame_id: odom
    guess_frame_id: odom
    publish_tf: false
    wait_for_transform: 0.2
    expected_update_rate: 0.0
    approx_sync: true
    subscribe_rgbd: false
    subscribe_depth: true
    subscribe_rgb: true
    topic_queue_size: 5
    sync_queue_size: 5
    qos: 2
    qos_camera_info: 2
    Odom/Strategy: "0"
    Vis/MinInliers: "12"
    Vis/InlierDistance: "0.08"
    Odom/GuessMotion: "false"
    Reg/Force3DoF: "true"

icp_odometry:
  ros__parameters:
    frame_id: base_link
    odom_frame_id: odom
    publish_tf: false
    wait_for_transform: 0.2
    guess_frame_id: odom
    expected_update_rate: 0.0
    qos: 2
    scan_cloud_max_points: -1
    scan_cloud_is_2d: false
    scan_downsampling_step: 1
    scan_range_min: 0.0
    scan_range_max: 0.0
    scan_voxel_size: 0.05
    scan_normal_k: 5
    scan_normal_radius: 0.0
    Odom/GuessMotion: "true"
    Reg/Force3DoF: "true"
    Icp/VoxelSize: "0.05"
    Icp/PointToPlane: "false"
    Icp/Iterations: "30"
    Icp/MaxCorrespondenceDistance: "0.10"
    Icp/MaxTranslation: "1.0"
    Icp/MaxRotation: "0.785"
